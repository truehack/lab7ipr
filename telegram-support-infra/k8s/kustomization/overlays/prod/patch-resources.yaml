apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  replicas: 2
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: ssd
        resources:
          requests:
            storage: 50Gi
  template:
    spec:
      containers:
        - name: postgres
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"