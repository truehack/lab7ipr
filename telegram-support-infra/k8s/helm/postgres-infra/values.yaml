replicaCount: 1
image:
  repository: postgres
  tag: "15.3"
  pullPolicy: IfNotPresent

storage:
  size: 10Gi
  storageClassName: "standard"

postgres:
  database: support_bot
  user: bot_user
  password: "change-me-in-overlay"

service:
  name: postgres
  port: 5432

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"