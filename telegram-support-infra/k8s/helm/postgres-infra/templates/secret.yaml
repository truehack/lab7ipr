apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-postgres-secret
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password }}
  DATABASE_URL: postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ .Values.service.name }}:{{ .Values.service.port }}/{{ .Values.postgres.database }}